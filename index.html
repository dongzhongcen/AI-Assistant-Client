<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AI Assistant Client</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 8.5A4.5 4.5 0 0 1 9.5 4h5A4.5 4.5 0 0 1 19 8.5v3A4.5 4.5 0 0 1 14.5 16H12l-4.5 4v-4A4.5 4.5 0 0 1 3 11.5v-3Z" /><path d="M8 10h8M8 13h5" /></svg>
          </span>
          <div>
            <strong>AI Assistant</strong>
            <span>OpenAI-compatible client</span>
          </div>
        </div>

        <button class="new-chat" id="newChatButton">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
          新建对话
        </button>

        <div class="search-box">
          <svg viewBox="0 0 24 24"><path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" /></svg>
          <input id="conversationSearch" type="search" placeholder="搜索会话" />
        </div>

        <nav class="conversation-list" id="conversationList" aria-label="会话列表"></nav>

        <div class="sidebar-footer">
          <button id="exportButton">
            <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4" /><path d="M5 21h14" /></svg>
            导出
          </button>
          <button id="clearButton">
            <svg viewBox="0 0 24 24"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" /></svg>
            清空
          </button>
        </div>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <button class="mobile-menu" id="mobileMenuButton" aria-label="打开会话列表">
            <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16" /></svg>
          </button>
          <div>
            <span class="eyebrow">AI 助手</span>
            <h1 id="chatTitle">新的对话</h1>
          </div>
          <div class="header-actions">
            <button class="ghost-button" id="promptButton">提示词</button>
            <button class="primary-button" id="settingsButton">
              <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" /><path d="M19.4 15a1.8 1.8 0 0 0 .4 2l.1.1-2 3.5-.2-.1a1.8 1.8 0 0 0-2.1.2 1.8 1.8 0 0 0-.6 1.9V23h-4v-.3a1.8 1.8 0 0 0-.6-1.9 1.8 1.8 0 0 0-2.1-.2l-.2.1-2-3.5.1-.1a1.8 1.8 0 0 0 .4-2 1.8 1.8 0 0 0-1.6-1.2H3v-4h.3a1.8 1.8 0 0 0 1.6-1.2 1.8 1.8 0 0 0-.4-2l-.1-.1 2-3.5.2.1a1.8 1.8 0 0 0 2.1-.2A1.8 1.8 0 0 0 9.3 1h4a1.8 1.8 0 0 0 .6 1.9 1.8 1.8 0 0 0 2.1.2l.2-.1 2 3.5-.1.1a1.8 1.8 0 0 0-.4 2 1.8 1.8 0 0 0 1.6 1.2h.3v4h-.3a1.8 1.8 0 0 0-1.9 1.2Z" /></svg>
              设置
            </button>
          </div>
        </header>

        <section class="notice" id="notice">
          <strong>还没有配置模型</strong>
          <span>点击右上角“设置”，填写 Base URL、API Key 和模型名。聊天使用 chat/completions，生图使用 images/generations。</span>
        </section>

        <section class="messages" id="messages" aria-live="polite"></section>

        <section class="composer">
          <div class="mode-row">
            <div class="mode-switch" role="group" aria-label="工作模式">
              <button type="button" class="active" id="chatModeButton">聊天</button>
              <button type="button" id="imageModeButton">生图</button>
            </div>
            <select id="imageSizeInput" class="image-size" aria-label="图片尺寸">
              <option value="1024x1024">1024 x 1024</option>
              <option value="1024x1536">1024 x 1536</option>
              <option value="1536x1024">1536 x 1024</option>
            </select>
          </div>
          <div class="quick-prompts" id="quickPrompts">
            <button data-prompt="帮我把下面这段内容总结成三个要点：">总结</button>
            <button data-prompt="请用中文解释这段代码的作用，并指出潜在问题：">解释代码</button>
            <button data-prompt="请把下面内容改写得更清晰、更专业：">润色</button>
          </div>
          <div class="attachment-tray" id="attachmentTray" hidden></div>
          <form id="chatForm">
            <input id="imageInput" type="file" accept="image/*" multiple hidden />
            <button class="attach-button" id="attachButton" type="button" aria-label="上传图片">
              <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4z" /><path d="m4 15 4-4 4 4 3-3 5 5" /><path d="M15 9h.01" /></svg>
            </button>
            <textarea id="messageInput" rows="1" placeholder="输入消息，Enter 发送，Shift + Enter 换行"></textarea>
            <button class="send-button" id="sendButton" type="submit" aria-label="发送">
              <svg viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4 20-7Z" /><path d="M22 2 11 13" /></svg>
            </button>
          </form>
          <p class="composer-hint" id="composerHint">聊天支持多图识别；生图会调用接口的 /images/generations，生成后可选择保存位置。</p>
        </section>
      </main>
    </div>

    <dialog class="modal" id="settingsModal">
      <form method="dialog" class="modal-card" id="settingsForm">
        <header>
          <div>
            <span class="eyebrow">Provider</span>
            <h2>模型设置</h2>
          </div>
          <button class="icon-only" value="cancel" aria-label="关闭">
            <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18" /></svg>
          </button>
        </header>
        <label>
          <span>Base URL</span>
          <input id="baseUrlInput" type="url" placeholder="https://api.openai.com/v1" />
        </label>
        <label>
          <span>API Key</span>
          <div class="input-action">
            <input id="apiKeyInput" type="password" placeholder="sk-..." autocomplete="off" />
            <button class="ghost-button compact" id="pasteKeyButton" type="button">粘贴</button>
          </div>
        </label>
        <label>
          <span>Model</span>
          <input id="modelInput" type="text" placeholder="gpt-4.1-mini" />
        </label>
        <div class="settings-grid">
          <label>
            <span>Temperature</span>
            <input id="temperatureInput" type="number" min="0" max="2" step="0.1" value="0.7" />
          </label>
          <label>
            <span>System Prompt</span>
            <input id="systemPromptInput" type="text" placeholder="你是一个可靠、清晰、耐心的中文 AI 助手。" />
          </label>
        </div>
        <footer>
          <button class="ghost-button" value="cancel">取消</button>
          <button class="primary-button" value="default">保存设置</button>
        </footer>
      </form>
    </dialog>

    <dialog class="modal" id="promptModal">
      <form method="dialog" class="modal-card prompt-card">
        <header>
          <div>
            <span class="eyebrow">Prompt Library</span>
            <h2>提示词库</h2>
          </div>
          <button class="icon-only" value="cancel" aria-label="关闭">
            <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18" /></svg>
          </button>
        </header>
        <div class="prompt-list" id="promptList"></div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
